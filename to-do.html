<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do List</title>
    <style>
    h1, h2{
        color: blueviolet;
    }

    .box > .done{
        color: firebrick;
    }

    ul li{
        color: blue;
    }

    li.done{
        color: green;
    }
    </style>
  </head>
  <body>
    <h1>To Do List</h1>
    <h2>Monday</h2>

    <div class="box">
      <p class="done">Do this things today</p>
      <ul>
        <li>Task 1</li>
        <li class="done">Task 2</li>
        <li class="done">Task 3</li>
      </ul>

      <ul>
        <p class="done">Other Items</p>
      </ul>

      <p>The best preparation for tomorrow is doing your best today.</p>
    </div>
  </body>
</html>
